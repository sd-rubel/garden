<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>দুআ বুকলেট | পৃষ্ঠা অপচয়হীন</title>

<style>
@font-face {
    font-family: 'Kalpurush';
    src: url('kalpurush.ttf') format('truetype');
    font-display: swap;
}
@font-face {
    font-family: 'ArabicFont';
    src: url('arabic.ttf') format('truetype');
    font-display: swap;
}

@counter-style bengali {
    system: numeric;
    symbols: '০' '১' '২' '৩' '৪' '৫' '৬' '৭' '৮' '৯';
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: white;
    font-family: 'Kalpurush', 'Segoe UI', 'Noto Sans Bengali', serif;
    color: #1f2a2f;
    padding: 12px 8px;
}

.page-wrapper {
    max-width: 210mm;
    margin: 0 auto;
    background: white;
}

/* বর্ডার সম্পূর্ণ বাদ */
.dua-block {
    background: white;
    border: none;
    border-radius: 0;
    margin-bottom: 8px;
    overflow: visible;
}

.dua-header {
    padding: 8px 12px 4px;
    border-bottom: none;
}

.dua-title {
    font-size: 18pt;
    font-weight: 800;
    color: #2c6b55;
    text-align: left;
}

.source-line {
    font-size: 9.5pt;
    color: #a5723e;
    text-align: right;
    direction: ltr;
    margin-top: 2px;
}

.arabic-text {
    font-family: 'ArabicFont', 'Scheherazade', serif;
    font-size: 25pt;
    text-align: center;
    direction: rtl;
    padding: 8px 12px 5px;
    line-height: 1.45;
}

.text-content {
    padding: 5px 12px 6px;
    line-height: 1.5;
    text-align: justify;
}

.pronunciation-line {
    font-size: 11.5pt;
    margin-bottom: 8px;
    text-align: justify;
}

.meaning-line {
    font-size: 12pt;
    margin-top: 4px;
    text-align: justify;
}

.label {
    font-weight: 700;
    color: #bf6f2c;
    display: inline-block;
    margin-right: 6px;
}

.word-chips-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 9px;
    padding: 5px 12px 9px;
}

.word-chip {
    flex: 0 0 auto;
    text-align: center;
    min-width: 95px;
    max-width: 165px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
}

.chip-arabic {
    font-family: 'ArabicFont', 'Scheherazade', serif;
    font-size: 15pt;
    font-weight: 600;
    direction: rtl;
    color: #1f5b48;
    margin-bottom: 3px;
}

.chip-pronounce {
    font-size: 9pt;
    color: #8b6e48;
    margin: 1px 0;
}

.chip-meaning {
    font-size: 9pt;
    color: #4c5c4c;
}

.no-word-msg {
    font-size: 9.5pt;
    color: #968c71;
    text-align: center;
    width: 100%;
}

/* ফজিলত লাইনের উপরের বর্ডার বাদ */
.merit {
    padding: 5px 12px 7px;
    font-size: 10pt;
    color: #2f5548;
    border-top: none;
    text-align: justify;
}

.merit b {
    color: #9b5e2c;
    font-size: 10pt;
}

.no-print {
    position: fixed;
    top: 14px;
    right: 18px;
    z-index: 1000;
}

.btn {
    background: #2c6b55;
    color: white;
    font-family: 'Kalpurush', sans-serif;
    padding: 6px 22px;
    font-size: 12px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

.btn:hover {
    background: #1f4f3e;
}

.loading-placeholder {
    text-align: center;
    padding: 40px;
    font-size: 13pt;
    color: #6a7c6e;
}

/* প্রিন্ট সেটআপ */
@media print {

    @page {
        size: A4 portrait;
        margin: 10mm 8mm 14mm 8mm;

        @bottom-center {
            content: counter(page, bengali);
            font-family: 'Kalpurush', sans-serif;
            font-size: 11pt;
            color: #2c5e4c;
        }
    }

    body {
        padding: 0;
        margin: 0;
        background: white;
    }

    .no-print {
        display: none !important;
    }

    .page-wrapper {
        width: 100%;
        margin: 0;
        padding: 0;
    }

    /* প্রিন্টেও কোন বর্ডার থাকবে না */
    .dua-block {
        margin-bottom: 5px;
        border: none !important;
        border-radius: 0;
        overflow: visible;
        page-break-inside: auto !important;
        break-inside: auto !important;
    }

    .dua-header {
        padding: 5px 10px 3px;
        border-bottom: none !important;
        break-inside: avoid;
        page-break-inside: avoid;
    }

    .dua-title {
        font-size: 18pt !important;
    }

    .source-line {
        font-size: 10pt !important;
    }

    .arabic-text {
        font-size: 26pt !important;
        line-height: 1.45;
        padding: 6px 10px 4px;
        break-inside: avoid;
        page-break-inside: avoid;
    }

    .text-content {
        padding: 4px 10px 5px;
    }

    .pronunciation-line {
        font-size: 13pt !important;
        margin-bottom: 6px !important;
    }

    .meaning-line {
        font-size: 14pt !important;
    }

    .word-chips-container {
        gap: 8px;
        padding: 4px 10px 6px;
        break-inside: auto;
        page-break-inside: auto;
    }

    .word-chip {
        min-width: 115px;
        max-width: 190px;
        break-inside: avoid;
        page-break-inside: avoid;
    }

    .chip-arabic {
        font-size: 17pt !important;
    }

    .chip-pronounce,
    .chip-meaning {
        font-size: 10pt !important;
    }

    .merit {
        border-top: none !important;
        font-size: 12pt !important;
        padding: 4px 10px 6px;
    }

    .merit b {
        font-size: 12pt !important;
    }
}
</style>
</head>

<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">🖨️ প্রিন্ট করুন</button>
</div>

<div class="page-wrapper" id="main-content">
    <div class="loading-placeholder">দুআ সংগ্রহ লোড হচ্ছে...</div>
</div>

<script>
(function() {

    const container = document.getElementById('main-content');

    function toBengaliNumber(num) {
        if (num === undefined || num === null) return '';
        const en = '0123456789';
        const bn = '০১২৩৪৫৬৭৮৯';
        return num.toString().replace(/[0-9]/g, d => bn[en.indexOf(d)]);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.toString().replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    fetch('data.json')
        .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        })
        .then(data => {

            container.innerHTML = '';

            if (!data || !data.length) {
                container.innerHTML = '<div style="padding:20px;text-align:center;">ডাটা নেই। data.json ফাইল চেক করুন।</div>';
                return;
            }

            data.forEach(dua => {

                let wordChipsHtml = '';

                if (Array.isArray(dua.word_by_word) && dua.word_by_word.length > 0) {

                    wordChipsHtml = `
                        <div class="word-chips-container">
                            ${dua.word_by_word.map(w => `
                                <div class="word-chip">
                                    <div class="chip-arabic">${escapeHtml(w.arabic || '—')}</div>

                                    ${w.pronunciation ? `
                                        <div class="chip-pronounce">
                                            ${escapeHtml(w.pronunciation)}
                                        </div>
                                    ` : ''}

                                    ${w.meaning ? `
                                        <div class="chip-meaning">
                                            ${escapeHtml(w.meaning)}
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;

                } else {

                    wordChipsHtml = `
                        <div class="word-chips-container">
                            <div class="no-word-msg">
                                শব্দভিত্তিক বিশ্লেষণ নেই
                            </div>
                        </div>
                    `;
                }

                const duaId = dua.dua_id
                    ? toBengaliNumber(dua.dua_id) + '. '
                    : '';

                const block = document.createElement('div');
                block.className = 'dua-block';

                block.innerHTML = `
                    <div class="dua-header">
                        <div class="dua-title">
                            ${escapeHtml(duaId + (dua.dua_name || 'দোয়া'))}
                        </div>

                        <div class="source-line">
                            ${escapeHtml(dua.source || 'উৎস')}
                        </div>
                    </div>

                    <div class="arabic-text">
                        ${escapeHtml(dua.arabic_full || '')}
                    </div>

                    <div class="text-content">

                        <div class="pronunciation-line">
                            <span class="label">উচ্চারণ:</span>
                            ${escapeHtml(dua.pronunciation || '—')}
                        </div>

                        <div class="meaning-line">
                            <span class="label">অর্থ বাংলা:</span>
                            ${escapeHtml(dua.bangla_translation || 'অনুবাদ নেই')}
                        </div>

                    </div>

                    ${wordChipsHtml}

                    <div class="merit">
                        <b>ফজিলত:</b>
                        ${escapeHtml(dua.merit || 'ফজিলত উল্লেখ নেই')}
                    </div>
                `;

                container.appendChild(block);
            });

        })
        .catch(error => {

            console.error(error);

            container.innerHTML = `
                <div style="
                    padding:24px;
                    text-align:center;
                    background:white;
                ">
                    <h3 style="color:#aa5e2b;">
                        data.json লোড করতে ব্যর্থ
                    </h3>

                    <p style="margin-top:8px;">
                        একই ফোল্ডারে
                        <strong>data.json</strong>
                        ফাইল রাখুন।
                    </p>
                </div>
            `;
        });

})();
</script>

</body>
</html>
