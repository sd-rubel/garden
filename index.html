<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Gardening | প্রিমিয়াম ড্যাশবোর্ড</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    @font-face {
      font-family: 'Kalpurush';
      src: url('kalpurush.ttf') format('truetype');
    }

    :root {
      --primary-dark: #071a13;
      --secondary: #2d6a4f;
      --accent: #40916c;
      --gold: #f1c40f;
      --bg: #f8faf8;
      --card-bg: #ffffff;
      --text-main: #1b4332;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; scroll-behavior: smooth; }
    body { font-family: 'Kalpurush', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; flex-direction: column; }

    /* --- Full Width Header --- */
    header { width: 100%; overflow: hidden; background: var(--primary-dark); line-height: 0; }
    .header-img { width: 100%; height: auto; max-height: 350px; object-fit: cover; display: block; }

    /* --- Search Bar --- */
    nav {
      position: sticky; top: 0; background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px); z-index: 1000; padding: 15px 6%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: center;
    }
    .search-box { position: relative; width: 100%; max-width: 550px; }
    .search-box input {
      width: 100%; padding: 14px 20px 14px 50px; border-radius: 15px;
      border: 2px solid #edf2ef; background: #fff; font-family: inherit; outline: none;
      transition: 0.3s; font-size: 1rem;
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(64, 145, 108, 0.1); }
    .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--secondary); font-size: 1.2rem; }

    /* --- Modern Tabs --- */
    .tabs { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
    .tab-btn {
      padding: 10px 25px; border-radius: 50px; border: 1px solid #dce4dc;
      background: #fff; color: var(--secondary); font-weight: bold; cursor: pointer;
      font-family: inherit; transition: 0.3s; display: flex; align-items: center; gap: 8px;
    }
    .tab-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2); }

    /* --- Premium Grid & Cards --- */
    main { flex: 1 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 0 6% 50px; }
    
    .card {
      background: var(--card-bg); border-radius: 25px; padding: 1.8rem;
      box-shadow: 0 5px 20px rgba(0,0,0,0.03); transition: 0.3s;
      cursor: pointer; position: relative; border: 1px solid rgba(0,0,0,0.02);
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); border-color: var(--accent); }
    .card h3 { font-size: 1.25rem; color: var(--primary-dark); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .card h3 i { color: #27ae60; }
    .card p { color: #666; font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; }
    
    .read-more { font-weight: bold; color: var(--accent); font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
    .fav-btn { position: absolute; top: 20px; right: 20px; color: #eee; font-size: 1.4rem; transition: 0.3s; }
    .fav-btn.active { color: var(--gold); transform: scale(1.1); text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }

    /* --- Full Screen Modal (FIXED) --- */
    .modal {
      position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; 
      overflow-y: auto; scroll-behavior: auto !important;
    }
    .close-btn {
      position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
      border-radius: 50%; background: #e74c3c; color: #fff; border: none;
      cursor: pointer; z-index: 2100; font-size: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .modal-hero { background: linear-gradient(135deg, #0a1f16 0%, #1b4332 100%); padding: 5rem 10% 2.5rem; color: #fff; }
    .meta-row { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
    .meta-item { background: rgba(255,255,255,0.12); padding: 8px 15px; border-radius: 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }
    .meta-item i { color: var(--accent); }

    .modal-body { padding: 2.5rem 10%; max-width: 1000px; margin: 0 auto; }
    .section-head { font-size: 1.3rem; font-weight: 800; color: var(--primary-dark); margin: 2.5rem 0 1.2rem; display: flex; align-items: center; gap: 12px; }
    
    .ing-tag { display: inline-flex; align-items: center; gap: 8px; background: #f0f7f4; padding: 10px 18px; border-radius: 12px; margin: 5px; font-weight: 600; border: 1px solid #e0eee7; }
    .ing-tag i { color: #27ae60; }

    .step-card { display: flex; gap: 20px; background: #fafafa; padding: 1.5rem; border-radius: 20px; margin-bottom: 15px; border: 1px solid #eee; transition: 0.3s; }
    .step-card:hover { border-color: var(--accent); background: #fff; }
    .step-icon { width: 40px; height: 40px; background: var(--secondary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: bold; }

    .qna-card { background: #fffcf2; border: 1px solid #f2e9c9; padding: 1.8rem; border-radius: 25px; margin-bottom: 15px; }
    .q-text { font-weight: 800; color: #7d651a; margin-bottom: 10px; display: flex; gap: 12px; font-size: 1.1rem; }
    .q-text i { color: #f39c12; }
    .a-text { display: flex; gap: 12px; padding-left: 5px; color: #444; line-height: 1.6; }
    .a-text i { color: #27ae60; margin-top: 4px; }

    /* --- Compact Footer --- */
    footer { background: var(--primary-dark); color: #8fa199; padding: 20px 6%; text-align: center; font-size: 0.9rem; border-top: 3px solid var(--accent); }
    .footer-links { display: flex; justify-content: center; gap: 25px; margin-bottom: 8px; }
    .footer-links a { color: var(--accent); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
    .footer-links a:hover { color: #fff; }

    /* Modal Nav */
    .modal-nav { display: flex; gap: 20px; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
    .nav-btn { flex: 1; padding: 15px; border-radius: 15px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-family: inherit; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--primary-dark); transition: 0.3s; }
    .nav-btn:hover { background: #f4f9f6; border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <img src="IMG_20260329_113755.png" alt="SD Gardening Banner" class="header-img">
</header>

<nav>
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="সার্চ করুন (যেমন: সার, পোকা, মাটি)...">
  </div>
</nav>

<div class="tabs">
  <button class="tab-btn active" onclick="changeTab('all', this)"><i class="fa-solid fa-leaf"></i> সব সমাধান</button>
  <button class="tab-btn" onclick="changeTab('fav', this)"><i class="fa-solid fa-star"></i> প্রিয় তালিকা</button>
</div>

<main>
  <div class="grid" id="mainGrid"></div>
</main>

<div class="modal" id="dataModal">
  <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
  <div id="modalContent"></div>
</div>

<footer>
  <div class="footer-links">
    <a href="https://www.facebook.com/sdxrubel" target="_blank"><i class="fa-brands fa-facebook"></i> ফেসবুক</a>
    <a href="tel:+8801516050402"><i class="fa-solid fa-phone-flip"></i> কল করুন</a>
  </div>
  <p>&copy; 2026 SD Gardening Solution | প্রকৃতির সাথে পথচলা</p>
</footer>

<script>
  let allData = [];
  let favorites = JSON.parse(localStorage.getItem('sd_favs')) || [];
  let currentTab = 'all';

  async function init() {
    let i = 1;
    while(true) {
      try {
        let res = await fetch(`task/${String(i).padStart(2, '0')}.json`);
        if(!res.ok) break;
        let data = await res.json();
        allData = [...allData, ...data.gardening_solutions];
        i++;
      } catch (e) { break; }
    }
    renderGrid(allData);
  }

  function renderGrid(data) {
    const grid = document.getElementById('mainGrid');
    let displayData = currentTab === 'all' ? data : data.filter(d => favorites.includes(d.id));
    grid.innerHTML = displayData.map(s => `
      <div class="card" onclick="openModal(${s.id})">
        <i class="fa-solid fa-star fav-btn ${favorites.includes(s.id) ? 'active' : ''}" onclick="toggleFav(event, ${s.id})"></i>
        <div>
          <h3><i class="fa-solid fa-seedling"></i> ${s.title}</h3>
          <p>${s.short_description}</p>
        </div>
        <div class="read-more">বিস্তারিত পড়ুন <i class="fa-solid fa-circle-arrow-right"></i></div>
      </div>
    `).join('');
  }

  function openModal(id) {
    const s = allData.find(x => x.id === id);
    const idx = allData.findIndex(x => x.id === id);
    const modal = document.getElementById('dataModal');
    
    // ১. পারফেক্ট স্ক্রল রিসেট
    modal.style.display = 'block';
    modal.scrollTop = 0; 
    document.body.style.overflow = 'hidden';

    let html = `
      <div class="modal-hero">
        <h2 style="font-size: 1.8rem; line-height: 1.4;">${s.title}</h2>
        <div class="meta-row">
          <div class="meta-item"><i class="fa-solid fa-clock-rotate-left"></i> সময়: ${s.preparation_time_hours} ঘণ্টা</div>
          <div class="meta-item"><i class="fa-solid fa-gauge-high"></i> লেভেল: ${s.difficulty === 'easy' ? 'সহজ' : 'মাঝারি'}</div>
          <div class="meta-item"><i class="fa-solid fa-calendar-check"></i> স্থায়িত্ব: ${s.shelf_life_days} দিন</div>
        </div>
      </div>
      <div class="modal-body">
        <div class="section-head"><i class="fa-solid fa-file-lines" style="color:#3498db"></i> বিস্তারিত বিবরণ</div>
        <p style="line-height:1.8; color:#444; font-size: 1.1rem;">${s.long_description}</p>

        <div class="section-head"><i class="fa-solid fa-flask-vial" style="color:#e67e22"></i> প্রয়োজনীয় উপকরণ</div>
        <div>${s.ingredients.map(ing => `
          <div class="ing-tag"><i class="fa-solid fa-circle-check"></i> ${ing.name} (${ing.quantity} ${ing.unit})</div>
        `).join('')}</div>

        <div class="section-head"><i class="fa-solid fa-wand-sparkles" style="color:#9b59b6"></i> প্রস্তুত ও প্রয়োগ প্রণালী</div>
        ${s.working_process.map(st => `
          <div class="step-card">
            <div class="step-icon">${st.step}</div>
            <div style="line-height:1.6">${st.description}</div>
          </div>
        `).join('')}

        <div class="section-head"><i class="fa-solid fa-comments-question" style="color:#f1c40f"></i> প্রশ্ন ও উত্তর (Q&A)</div>
        ${s.faqs.map(f => `
          <div class="qna-card">
            <div class="q-text"><i class="fa-solid fa-circle-question"></i> ${f.question}</div>
            <div class="a-text"><i class="fa-solid fa-hand-holding-heart"></i> ${f.answer}</div>
          </div>
        `).join('')}

        <div class="modal-nav">
          <button class="nav-btn" onclick="openModal(${allData[idx-1]?.id || id})"><i class="fa-solid fa-chevron-left"></i> আগেরটি</button>
          <button class="nav-btn" onclick="openModal(${allData[idx+1]?.id || id})">পরেরটি <i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    `;
    document.getElementById('modalContent').innerHTML = html;
  }

  function closeModal() {
    const modal = document.getElementById('dataModal');
    modal.style.display = 'none';
    modal.scrollTop = 0; 
    document.body.style.overflow = 'auto';
  }

  function toggleFav(e, id) {
    e.stopPropagation();
    if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
    else favorites.push(id);
    localStorage.setItem('sd_favs', JSON.stringify(favorites));
    renderGrid(allData);
  }

  function changeTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderGrid(allData);
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    const filtered = allData.filter(s => s.title.toLowerCase().includes(val) || s.short_description.toLowerCase().includes(val));
    renderGrid(filtered);
  });

  init();
</script>
</body>
</html>
