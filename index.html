<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Taqwa.top - গার্ডেনিং সলিউশনস</title>
    <meta name="description" content="প্রাকৃতিক উপায়ে গাছের পরিচর্যা - জৈব সার, বালাইনাশক ও টিপস।">
    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div class="app-container">
        <header class="premium-header">
            <div class="header-inner">
                <a href="/" class="logo premium-logo">🌿 Taqwa.top</a>
                <button id="themeToggle" class="theme-btn-glass" aria-label="থিম টগল"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <main>
            <section class="hero-premium">
                <h1>জৈব সমাধান <span class="gradient-text">আপনার বাগানের জন্য</span></h1>
                <p>কলার খোসা থেকে নিম তেল – ঘরেই তৈরি করুন শক্তিশালী জৈব সার ও বালাইনাশক</p>
                <div class="search-premium">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="সার্চ করুন (টাইটেল বা বিবরণে)" class="search-input-premium">
                    <button id="clearSearch" class="clear-premium"><i class="fas fa-times"></i></button>
                </div>
            </section>

            <div id="cardsGrid" class="cards-grid-premium"></div>
            <div id="messageArea" class="message-premium"></div>
        </main>

        <footer class="premium-footer">
            <div class="footer-grid">
                <div class="footer-brand">
                    <div class="footer-logo">🌿 Taqwa.top</div>
                    <p>প্রাকৃতিক কৃষি ও বাগানচর্চায় বিশ্বাসী</p>
                </div>
                <div class="footer-links">
                    <a href="#">গোপনীয়তা নীতি</a>
                    <a href="#">শর্তাবলী</a>
                    <a href="#">যোগাযোগ</a>
                </div>
                <div class="footer-contact">
                    <p><i class="fas fa-map-marker-alt"></i> মেহেরপুর হোটেল বাজার, মেহেরপুর</p>
                    <p><i class="fas fa-envelope"></i> sdnrubel@gmail.com</p>
                </div>
                <div class="footer-social">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
            <div class="footer-copyright">
                <p>© 2025 Taqwa.top – সর্বস্বত্ব সংরক্ষিত</p>
            </div>
        </footer>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/index.js"></script>
</body>
</html>
