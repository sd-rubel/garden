<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Gardening Solution | প্রিমিয়াম গার্ডেনিং সলিউশন</title>

  <link href="https://fonts.cdnfonts.com/css/kalpurush" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    :root{
      --primary:#1b5e20;
      --secondary:#2e7d32;
      --accent:#66bb6a;
      --bg:#f4f7f2;
      --card:#ffffff;
      --text:#1b2b1b;
      --muted:#6b8c6b;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Kalpurush','Hind Siliguri',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .premium-header{
      position:sticky;top:0;
      background:#ffffffee;
      backdrop-filter:blur(10px);
      padding:1rem;
      border-bottom:1px solid #e0ecd9;
      z-index:100;
    }

    .header-container{
      max-width:1200px;margin:auto;
      display:flex;justify-content:space-between;align-items:center;
    }

    .logo-area{display:flex;gap:10px;align-items:center;}

    .logo-icon{
      width:42px;height:42px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      display:flex;align-items:center;justify-content:center;
      color:#fff;
    }

    .brand-text h1{
      font-size:1.4rem;
      color:var(--primary);
    }

    .tab-bar{
      display:flex;gap:1rem;
      max-width:1200px;margin:auto;
      padding:0.5rem;
    }

    .tab-btn{
      border:none;background:none;
      padding:0.5rem 1rem;
      cursor:pointer;
      border-radius:20px;
      color:var(--muted);
    }

    .tab-btn.active{
      background:var(--secondary);
      color:#fff;
    }

    .filters-bar{
      max-width:1200px;margin:1rem auto;
      display:flex;justify-content:space-between;gap:1rem;
      flex-wrap:wrap;
    }

    .category-chip{
      padding:5px 12px;
      border-radius:20px;
      background:#e8f5e9;
      cursor:pointer;
      font-size:0.8rem;
    }

    .category-chip.active{
      background:var(--secondary);
      color:#fff;
    }

    .search-box{
      background:#fff;
      border-radius:20px;
      padding:4px 10px;
      display:flex;
      border:1px solid #cfe3c8;
    }

    .search-box input{
      border:none;outline:none;
      padding:5px;
    }

    .main-content{
      max-width:1200px;margin:auto;
      padding:1rem;
    }

    .solutions-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:1.2rem;
    }

    .solution-card{
      background:var(--card);
      border-radius:16px;
      padding:1rem;
      cursor:pointer;
      transition:0.25s;
      border:1px solid #e0ecd9;
    }

    .solution-card:hover{
      transform:translateY(-4px);
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .card-title{
      font-size:1.1rem;
      font-weight:700;
      color:var(--primary);
      margin-bottom:5px;
    }

    .card-short-desc{
      font-size:0.85rem;
      color:var(--muted);
    }

    /* DETAILS PAGE */
    .details-page{
      display:none;
      max-width:900px;
      margin:1rem auto;
      background:#fff;
      padding:1.5rem;
      border-radius:16px;
      border:1px solid #e0ecd9;
    }

    .back-btn{
      margin-bottom:1rem;
      cursor:pointer;
      color:var(--secondary);
    }

    .ingredient-list li,
    .step-list li{
      margin-bottom:8px;
    }

    .faq-item{
      margin-bottom:10px;
      padding:10px;
      background:#f1f8ee;
      border-left:4px solid var(--accent);
      border-radius:8px;
    }

  </style>
</head>

<body>

<header class="premium-header">
  <div class="header-container">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-leaf"></i></div>
      <div class="brand-text">
        <h1>SD Gardening</h1>
        <p>অর্গানিক গাইড</p>
      </div>
    </div>
    <div><span id="globalCount">0</span> টি</div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="home">হোম</button>
  <button class="tab-btn" data-tab="favorites">ফেভারিট (<span id="favCount">0</span>)</button>
</div>

<div class="filters-bar">
  <div id="categoriesContainer">
    <span class="category-chip active" data-cat="all">সব</span>
  </div>
  <div class="search-box">
    <input id="searchInput" placeholder="সার্চ করুন">
    <button id="searchBtn"><i class="fas fa-search"></i></button>
  </div>
</div>

<main class="main-content">
  <div id="solutionsGrid" class="solutions-grid"></div>
</main>

<!-- DETAILS PAGE -->
<div id="detailsPage" class="details-page">
  <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> ফিরে যান</div>
  <h2 id="dTitle"></h2>
  <p id="dDesc"></p>

  <h3>উপকরণ</h3>
  <ul id="dIng" class="ingredient-list"></ul>

  <h3>প্রক্রিয়া</h3>
  <ul id="dSteps" class="step-list"></ul>

  <h3>FAQ</h3>
  <div id="dFaq"></div>
</div>

<script>
let allSolutions=[];
let favorites=new Set();
let currentTab='home';
let currentCategory='all';
let search='';

const grid=document.getElementById('solutionsGrid');

function render(){
  let data=[...allSolutions];

  if(currentCategory!=='all'){
    data=data.filter(d=>d.category===currentCategory);
  }

  if(search){
    data=data.filter(d=>d.title.toLowerCase().includes(search.toLowerCase()));
  }

  if(currentTab==='favorites'){
    data=data.filter(d=>favorites.has(d.id));
  }

  grid.innerHTML='';
  data.forEach(d=>{
    const div=document.createElement('div');
    div.className='solution-card';
    div.innerHTML=`
      <div class="card-title">${d.title}</div>
      <div class="card-short-desc">${d.short_description || ''}</div>
    `;
    div.onclick=()=>openDetails(d);
    grid.appendChild(div);
  });
}

function openDetails(d){
  document.querySelector('.main-content').style.display='none';
  document.getElementById('detailsPage').style.display='block';

  dTitle.innerText=d.title;
  dDesc.innerText=d.long_description || '';

  dIng.innerHTML=(d.ingredients||[]).map(i=>`<li>${i.name} - ${i.quantity||''} ${i.unit||''}</li>`).join('');
  dSteps.innerHTML=(d.working_process||[]).map(s=>`<li>${s.step}. ${s.description}</li>`).join('');
  dFaq.innerHTML=(d.faqs||[]).map(f=>`<div class="faq-item"><b>${f.question}</b><br>${f.answer}</div>`).join('');
}

function goBack(){
  document.querySelector('.main-content').style.display='block';
  document.getElementById('detailsPage').style.display='none';
}

async function load(){
  const res=await fetch('task/01.json');
  const data=await res.json();
  allSolutions=data.gardening_solutions;
  document.getElementById('globalCount').innerText=allSolutions.length;
  render();
}

document.getElementById('searchBtn').onclick=()=>{
  search=searchInput.value;
  render();
};

load();
</script>

</body>
</html>
