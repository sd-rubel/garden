<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Gardening | প্রিমিয়াম কৃষি সলিউশন</title>
  
  <style>
    /* লোকাল কালপুরুষ ফন্ট লোড */
    @font-face {
      font-family: 'Kalpurush';
      src: url('kalpurush.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --primary: #1a4332;
      --accent: #4ade80;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Kalpurush', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Header Design */
    header {
      position: sticky;
      top: 0;
      background: var(--glass);
      backdrop-filter: blur(12px);
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo h1 {
      font-size: 1.5rem;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .search-wrapper {
      position: relative;
      width: 300px;
    }

    .search-wrapper input {
      width: 100%;
      padding: 0.6rem 1rem;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      outline: none;
      transition: 0.3s;
      font-family: inherit;
    }

    .search-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.1); }

    /* Filter Chips */
    .filter-container {
      padding: 1.5rem 5%;
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      white-space: nowrap;
    }

    .chip {
      padding: 0.5rem 1.2rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 100px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Grid Layout */
    .solutions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      padding: 0 5% 4rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 1.5rem;
      border: 1px solid rgba(0,0,0,0.03);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }

    .card-id {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 0.5rem;
      display: block;
    }

    .card h2 { font-size: 1.25rem; margin-bottom: 0.8rem; color: var(--primary); }
    .card p { font-size: 0.95rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* Modal Styling - Premium Single View */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-content {
      background: #fff;
      width: 100%;
      max-width: 800px;
      max-height: 90vh;
      border-radius: 32px;
      overflow-y: auto;
      position: relative;
      animation: modalFade 0.4s ease;
    }

    @keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .modal-header-img {
      height: 120px;
      background: linear-gradient(135deg, #1a4332 0%, #2d6a4f 100%);
      padding: 2rem;
      color: white;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-inner { padding: 2rem; }
    
    .section-title {
      font-size: 1.2rem;
      color: var(--primary);
      margin: 1.5rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid var(--accent);
      padding-left: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .info-item {
      background: var(--bg);
      padding: 1rem;
      border-radius: 16px;
      text-align: center;
    }

    .info-item label { display: block; font-size: 0.75rem; color: var(--text-muted); }
    .info-item span { font-weight: bold; color: var(--primary); }

    .step-box {
      background: #fdfdfd;
      border: 1px solid #f1f5f9;
      padding: 1rem;
      border-radius: 16px;
      margin-bottom: 0.8rem;
    }

    .step-num { color: var(--accent); font-weight: bold; margin-right: 8px; }

    .faq-box {
      background: #f0fdf4;
      padding: 1rem;
      border-radius: 16px;
      margin-bottom: 1rem;
    }

    .faq-q { font-weight: bold; color: var(--primary); margin-bottom: 5px; }

    /* Scrollbar */
    .modal-content::-webkit-scrollbar { width: 6px; }
    .modal-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
      .search-wrapper { width: 150px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1>SD Gardening</h1>
  </div>
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="খুঁজুন...">
  </div>
</header>

<div class="filter-container" id="filterChips">
  <div class="chip active" onclick="filterData('all')">সব সমাধান</div>
</div>

<main class="solutions-grid" id="mainGrid">
  </main>

<div class="modal" id="modalOverlay">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-header-img">
      <h2 id="mTitle">শিরোনাম</h2>
    </div>
    <div class="modal-inner">
      <div class="info-grid">
        <div class="info-item"><label>সময়</label><span id="mTime">-</span></div>
        <div class="info-item"><label>কঠিনতা</label><span id="mDiff">-</span></div>
        <div class="info-item"><label>স্থায়িত্ব</label><span id="mLife">-</span></div>
      </div>

      <div class="section-title">বিস্তারিত বিবরণ</div>
      <p id="mDesc" style="color: var(--text-muted);"></p>

      <div class="section-title">উপকরণসমূহ</div>
      <div id="mIngredients" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>

      <div class="section-title">প্রস্তুত প্রণালী</div>
      <div id="mSteps"></div>

      <div class="section-title">সাধারণ জিজ্ঞাসা</div>
      <div id="mFaqs"></div>
    </div>
  </div>
</div>

<script>
  let solutions = [];

  // ১. ডেটা লোড করা
  async function loadData() {
    try {
      const response = await fetch('task/01.json');
      const data = await response.json();
      solutions = data.gardening_solutions;
      renderCards(solutions);
      setupFilters();
    } catch (error) {
      console.error("ডেটা লোড করতে সমস্যা হয়েছে।", error);
    }
  }

  // ২. কার্ড রেন্ডার করা
  function renderCards(data) {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = data.map(sol => `
      <div class="card" onclick="openModal(${sol.id})">
        <span class="card-id">#${sol.id}</span>
        <h2>${sol.title}</h2>
        <p>${sol.short_description}</p>
        <div style="margin-top: 15px; font-weight: bold; color: var(--accent); font-size: 0.85rem;">
          বিস্তারিত পড়ুন →
        </div>
      </div>
    `).join('');
  }

  // ৩. মোডাল ওপেন করা (একক স্ক্রিন লেআউট)
  function openModal(id) {
    const sol = solutions.find(s => s.id === id);
    if(!sol) return;

    document.getElementById('mTitle').innerText = sol.title;
    document.getElementById('mTime').innerText = sol.preparation_time_hours + " ঘণ্টা";
    document.getElementById('mDiff').innerText = sol.difficulty === 'easy' ? "সহজ" : "মাঝারি";
    document.getElementById('mLife').innerText = sol.shelf_life_days + " দিন";
    document.getElementById('mDesc').innerText = sol.long_description;

    // উপকরণ
    document.getElementById('mIngredients').innerHTML = sol.ingredients.map(ing => 
      `<span style="background: #e2e8f0; padding: 4px 12px; border-radius: 8px; font-size: 0.85rem;">${ing.name} (${ing.quantity} ${ing.unit})</span>`
    ).join('');

    // স্টেপস
    document.getElementById('mSteps').innerHTML = sol.working_process.map(step => `
      <div class="step-box">
        <span class="step-num">${step.step}.</span> ${step.description}
      </div>
    `).join('');

    // FAQ
    document.getElementById('mFaqs').innerHTML = sol.faqs.map(f => `
      <div class="faq-box">
        <div class="faq-q">প্রশ্ন: ${f.question}</div>
        <div style="font-size: 0.9rem; color: #4b5563;">উত্তর: ${f.answer}</div>
      </div>
    `).join('');

    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }

  // ৪. ফিল্টার ও সার্চ লজিক
  function setupFilters() {
    const categories = ['all', ...new Set(solutions.map(s => s.category))];
    const filterBox = document.getElementById('filterChips');
    
    filterBox.innerHTML = categories.map(cat => `
      <div class="chip ${cat === 'all' ? 'active' : ''}" onclick="filterByCategory(this, '${cat}')">
        ${cat === 'all' ? 'সব সমাধান' : cat.replace('_', ' ')}
      </div>
    `).join('');
  }

  function filterByCategory(el, cat) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    
    const filtered = cat === 'all' ? solutions : solutions.filter(s => s.category === cat);
    renderCards(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = solutions.filter(s => 
      s.title.toLowerCase().includes(term) || 
      s.short_description.toLowerCase().includes(term)
    );
    renderCards(filtered);
  });

  // ইনিশিয়ালাইজ
  loadData();
</script>

</body>
</html>
