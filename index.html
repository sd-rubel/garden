<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Gardening | প্রিমিয়াম ড্যাশবোর্ড</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    @font-face {
      font-family: 'Kalpurush';
      src: url('kalpurush.ttf') format('truetype');
    }

    :root {
      --primary: #0f291e;
      --secondary: #2d6a4f;
      --accent: #40916c;
      --bg: #f3f6f3;
      --white: #ffffff;
      --text-main: #1b4332;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Kalpurush', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
    }

    /* --- Navigation & Search --- */
    nav {
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1000;
      padding: 1rem 6%;
      box-shadow: 0 2px 15px rgba(0,0,0,0.04);
    }

    .nav-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .brand h1 { font-size: 1.4rem; color: var(--primary); display: flex; align-items: center; gap: 10px; }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-box input {
      width: 100%;
      padding: 12px 20px 12px 45px;
      border-radius: 15px;
      border: 2px solid #e0e7e0;
      outline: none;
      font-family: inherit;
      transition: 0.3s;
    }

    .search-box input:focus { border-color: var(--accent); background: #fff; }
    .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--secondary); }

    /* --- Tabs --- */
    .tab-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }

    .tab-btn {
      padding: 10px 25px;
      border-radius: 50px;
      border: none;
      background: #e1ede4;
      color: var(--secondary);
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn.active { background: var(--primary); color: white; }

    /* --- Grid --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 0 6% 50px;
    }

    .card {
      background: var(--white);
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.02);
      cursor: pointer;
      position: relative;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    .card:hover { transform: translateY(-5px); border-color: var(--accent); }
    .bookmark-icon { position: absolute; top: 20px; right: 20px; color: #ccc; font-size: 1.2rem; }
    .bookmark-icon.active { color: #f1c40f; }

    /* --- Full Screen Modal --- */
    #fullModal {
      position: fixed; inset: 0; background: var(--white);
      z-index: 2000; display: none; overflow-y: auto;
    }

    .close-sticky {
      position: fixed; top: 20px; right: 20px;
      width: 45px; height: 45px; border-radius: 50%;
      background: #e74c3c; color: white; border: none;
      cursor: pointer; z-index: 2100; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .modal-hero { background: var(--primary); padding: 5rem 10% 2rem; color: white; }
    .meta-row { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
    .meta-pill { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 10px; font-size: 0.85rem; }

    .modal-body { padding: 2rem 10%; max-width: 900px; margin: 0 auto; }
    .qna-box { background: #fdfdfd; border: 1px solid #eee; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
    .q-text { font-weight: bold; color: var(--primary); display: flex; gap: 10px; margin-bottom: 10px; }
    .a-text { color: #555; display: flex; gap: 10px; padding-left: 5px; }

    footer { background: var(--primary); color: #8fa199; padding: 3rem 6%; text-align: center; margin-top: 30px; }
    .footer-links a { color: var(--accent); text-decoration: none; margin: 0 10px; font-size: 1.1rem; }
  </style>
</head>
<body>

<nav>
  <div class="nav-top">
    <div class="brand"><h1><i class="fa-solid fa-house-chimney-medical"></i> SD Gardening</h1></div>
  </div>
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="আপনার প্রয়োজনীয় সমাধানটি সার্চ করুন...">
  </div>
</nav>

<div class="tab-container">
  <button class="tab-btn active" onclick="switchTab('all', this)"><i class="fa-solid fa-list-ul"></i> সব পোস্টগুলি</button>
  <button class="tab-btn" onclick="switchTab('fav', this)"><i class="fa-solid fa-bookmark"></i> বুকমার্ক</button>
</div>

<main class="grid" id="mainGrid"></main>

<div id="fullModal">
  <button class="close-sticky" onclick="closeM()"><i class="fa-solid fa-xmark"></i></button>
  <div class="modal-hero">
    <h2 id="mTitle" style="font-size: 1.8rem;">শিরোনাম</h2>
    <div class="meta-row">
      <span class="meta-pill"><i class="fa-solid fa-clock"></i> <span id="mTime"></span></span>
      <span class="meta-pill"><i class="fa-solid fa-gauge"></i> <span id="mDiff"></span></span>
      <span class="meta-pill"><i class="fa-solid fa-calendar-day"></i> <span id="mLife"></span></span>
    </div>
  </div>
  <div class="modal-body">
    <div id="mContent"></div>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="https://www.facebook.com/sdxrubel" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
    <a href="tel:+8801516050402"><i class="fa-solid fa-phone-volume"></i> +8801516050402</a>
  </div>
  <p style="margin-top: 15px;">© 2026 | SD Gardening Solution | প্রিমিয়াম কৃষি সেবা</p>
</footer>

<script>
  let solutions = [];
  let bookmarks = JSON.parse(localStorage.getItem('sd_bookmarks')) || [];
  let currentView = 'all';

  async function loadAllData() {
    let i = 1;
    while(true) {
      try {
        let res = await fetch(`task/${String(i).padStart(2, '0')}.json`);
        if(!res.ok) break;
        let data = await res.json();
        solutions = [...solutions, ...data.gardening_solutions];
        i++;
      } catch (e) { break; }
    }
    render();
  }

  function render() {
    const grid = document.getElementById('mainGrid');
    let data = currentView === 'all' ? solutions : solutions.filter(s => bookmarks.includes(s.id));
    
    grid.innerHTML = data.map(s => `
      <div class="card" onclick="openM(${s.id})">
        <i class="fa-solid fa-bookmark bookmark-icon ${bookmarks.includes(s.id) ? 'active' : ''}" 
           onclick="toggleBookmark(event, ${s.id})"></i>
        <h3 style="margin-bottom:10px; color:var(--primary);"><i class="fa-solid fa-leaf"></i> ${s.title}</h3>
        <p style="font-size:0.9rem; color:#666;">${s.short_description}</p>
      </div>
    `).join('');
  }

  function openM(id) {
    const s = solutions.find(x => x.id === id);
    const modal = document.getElementById('fullModal');
    
    // স্ক্রল পজিশন ঠিক করা (Problem Fixed)
    modal.scrollTop = 0; 

    document.getElementById('mTitle').innerText = s.title;
    document.getElementById('mTime').innerText = s.preparation_time_hours + " ঘণ্টা";
    document.getElementById('mDiff').innerText = s.difficulty === 'easy' ? "সহজ" : "মাঝারি";
    document.getElementById('mLife').innerText = s.shelf_life_days + " দিন";

    let html = `<div style="margin-bottom:30px;"><h4 style="margin-bottom:10px;"><i class="fa-solid fa-file-invoice"></i> বিস্তারিত</h4><p>${s.long_description}</p></div>`;
    
    html += `<h4 style="margin-bottom:15px;"><i class="fa-solid fa-vial"></i> উপকরণ ও প্রশ্নোত্তর</h4>`;
    
    s.faqs.forEach(f => {
      html += `
        <div class="qna-box">
          <div class="q-text"><i class="fa-solid fa-circle-question" style="color:var(--accent);"></i> ${f.question}</div>
          <div class="a-text"><i class="fa-solid fa-circle-check" style="color:#27ae60;"></i> ${f.answer}</div>
          <div style="margin-top:10px; font-size:0.8rem; color:#aaa;">
            <i class="fa-solid fa-tags"></i> ${f.tags.join(', ')} | 
            <i class="fa-solid fa-shield-heart"></i> নিরাপদ পদ্ধতি
          </div>
        </div>`;
    });

    document.getElementById('mContent').innerHTML = html;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeM() {
    document.getElementById('fullModal').style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function toggleBookmark(e, id) {
    e.stopPropagation();
    if(bookmarks.includes(id)) {
      bookmarks = bookmarks.filter(b => b !== id);
    } else {
      bookmarks.push(id);
    }
    localStorage.setItem('sd_bookmarks', JSON.stringify(bookmarks));
    render();
  }

  function switchTab(type, el) {
    currentView = type;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    let term = e.target.value.toLowerCase();
    let filtered = solutions.filter(s => s.title.toLowerCase().includes(term) || s.short_description.toLowerCase().includes(term));
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = filtered.map(s => `
      <div class="card" onclick="openM(${s.id})">
        <i class="fa-solid fa-bookmark bookmark-icon ${bookmarks.includes(s.id) ? 'active' : ''}" 
           onclick="toggleBookmark(event, ${s.id})"></i>
        <h3><i class="fa-solid fa-leaf"></i> ${s.title}</h3>
        <p>${s.short_description}</p>
      </div>
    `).join('');
  });

  loadAllData();
</script>
</body>
</html>
