<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Gardening | প্রিমিয়াম কৃষি সলিউশন</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    @font-face {
      font-family: 'Kalpurush';
      src: url('kalpurush.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --primary: #143628;
      --secondary: #2d6a4f;
      --accent: #52b788;
      --bg: #f0f4f0;
      --card-bg: #ffffff;
      --text-main: #1b4332;
      --text-muted: #5e716a;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Kalpurush', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* --- Navigation --- */
    nav {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      z-index: 1000;
      padding: 1rem 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 15px rgba(0,0,0,0.03);
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand i { font-size: 1.8rem; color: var(--secondary); }
    .brand h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary); }

    .search-bar {
      background: #e9f0e9;
      padding: 8px 15px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      width: 350px;
      transition: 0.3s;
    }
    .search-bar:focus-within { background: #fff; box-shadow: 0 0 0 2px var(--accent); }
    .search-bar input {
      border: none; background: none; outline: none; width: 100%;
      padding-left: 10px; font-family: inherit;
    }
    .search-bar i { color: var(--secondary); }

    /* --- Filter Area --- */
    .filter-section {
      padding: 1.5rem 6%;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-section::-webkit-scrollbar { display: none; }

    .tag-chip {
      padding: 8px 20px;
      background: #fff;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: 0.3s;
      display: flex; align-items: center; gap: 8px;
      border: 1px solid #d8e2dc;
      white-space: nowrap;
    }
    .tag-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* --- Main Grid --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 25px;
      padding: 10px 6% 50px;
    }

    .solution-card {
      background: var(--card-bg);
      border-radius: 30px;
      padding: 2rem;
      position: relative;
      border: 1px solid rgba(0,0,0,0.02);
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      cursor: pointer;
    }
    .solution-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    
    .card-icon {
      width: 50px; height: 50px; background: #f0f7f4;
      border-radius: 15px; display: flex; align-items: center;
      justify-content: center; margin-bottom: 1.5rem;
      color: var(--secondary); font-size: 1.4rem;
    }

    .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
    .card-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; }

    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #f1f1f1; padding-top: 1rem;
    }
    .badge { font-size: 0.8rem; font-weight: 700; color: var(--secondary); text-transform: uppercase; }

    /* --- Modal: Single View Premium --- */
    .modal {
      position: fixed; inset: 0; background: rgba(10, 26, 18, 0.6);
      backdrop-filter: blur(12px); z-index: 2000;
      display: none; justify-content: center; align-items: center; padding: 20px;
    }
    .modal-content {
      background: #fff; width: 100%; max-width: 900px; max-height: 92vh;
      border-radius: 40px; overflow-y: auto; position: relative;
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-header {
      background: linear-gradient(135deg, #143628 0%, #2d6a4f 100%);
      padding: 3rem 2.5rem; color: #fff; position: relative;
    }
    .close-modal {
      position: absolute; top: 25px; right: 25px;
      width: 45px; height: 45px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      cursor: pointer; font-size: 1.2rem; transition: 0.3s;
    }
    .close-modal:hover { background: #fff; color: var(--primary); }

    .modal-body { padding: 2.5rem; }
    
    .meta-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px; margin-top: -5rem; margin-bottom: 2rem;
    }
    .meta-card {
      background: #fff; padding: 1.2rem; border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center;
    }
    .meta-card i { color: var(--accent); margin-bottom: 8px; display: block; font-size: 1.2rem; }
    .meta-card b { font-size: 1rem; color: var(--primary); }

    .section { margin-bottom: 2.5rem; }
    .section-head {
      font-size: 1.2rem; font-weight: 800; color: var(--primary);
      margin-bottom: 1.2rem; display: flex; align-items: center; gap: 12px;
    }
    .section-head i { color: var(--accent); }

    .ingredient-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: #f0f7f4; padding: 8px 18px; border-radius: 12px;
      margin: 5px; font-weight: 600; border: 1px solid #e0eee7;
    }

    .step-item {
      display: flex; gap: 20px; background: #fafafa;
      padding: 1.5rem; border-radius: 20px; margin-bottom: 15px;
      border: 1px solid #f0f0f0;
    }
    .step-count {
      width: 35px; height: 35px; background: var(--primary); color: #fff;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: bold;
    }

    .faq-item {
      background: #fffdf5; border: 1px solid #f9f2d5;
      padding: 1.5rem; border-radius: 20px; margin-bottom: 12px;
    }
    .faq-q { font-weight: 800; color: #856404; margin-bottom: 8px; display: flex; gap: 10px; }

    @media (max-width: 768px) {
      .search-bar { display: none; }
      .grid { grid-template-columns: 1fr; }
      .modal-content { border-radius: 0; max-height: 100vh; }
    }
  </style>
</head>
<body>

<nav>
  <div class="brand">
    <i class="fa-solid fa-seedling"></i>
    <h1>SD Gardening</h1>
  </div>
  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="আপনার সমস্যা বা সমাধান খুঁজুন...">
  </div>
</nav>

<div class="filter-section" id="filterArea">
  <div class="tag-chip active" onclick="filterByCat('all')">
    <i class="fa-solid fa-border-all"></i> সব সমাধান
  </div>
</div>

<main class="grid" id="mainGrid">
  </main>

<div class="modal" id="modalOverlay">
  <div class="modal-content">
    <button class="close-modal" onclick="closeM()"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-header">
      <h2 id="mTitle" style="font-size: 2rem; max-width: 80%;">শিরোনাম</h2>
      <p id="mCategory" style="opacity: 0.8; margin-top: 10px;"></p>
    </div>
    <div class="modal-body">
      <div class="meta-row">
        <div class="meta-card"><i class="fa-solid fa-clock"></i><label>সময়</label><br><b id="mTime">-</b></div>
        <div class="meta-card"><i class="fa-solid fa-gauge-high"></i><label>লেভেল</label><br><b id="mDiff">-</b></div>
        <div class="meta-card"><i class="fa-solid fa-box-archive"></i><label>স্থায়িত্ব</label><br><b id="mLife">-</b></div>
      </div>

      <div class="section">
        <div class="section-head"><i class="fa-solid fa-circle-info"></i> বিস্তারিত বিবরণ</div>
        <p id="mLongDesc" style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.8;"></p>
      </div>

      <div class="section">
        <div class="section-head"><i class="fa-solid fa-basket-shopping"></i> প্রয়োজনীয় উপকরণ</div>
        <div id="mIngs"></div>
      </div>

      <div class="section">
        <div class="section-head"><i class="fa-solid fa-wand-magic-sparkles"></i> প্রস্তুত ও প্রয়োগ পদ্ধতি</div>
        <div id="mSteps"></div>
      </div>

      <div class="section">
        <div class="section-head"><i class="fa-solid fa-circle-question"></i> সচরাচর জিজ্ঞাসা</div>
        <div id="mFaqs"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let allSolutions = [];

  // ১. ইনডিফিনিট লুপে JSON লোড করা (Infinity Loader)
  async function init() {
    let fileNum = 1;
    let loading = true;

    while(loading) {
      let fileName = `task/${String(fileNum).padStart(2, '0')}.json`;
      try {
        const response = await fetch(fileName);
        if(!response.ok) throw new Error();
        
        const data = await response.json();
        allSolutions = [...allSolutions, ...data.gardening_solutions];
        fileNum++;
      } catch (e) {
        loading = false; // ফাইল না পাওয়া গেলে লুপ বন্ধ হবে
      }
    }
    
    render(allSolutions);
    generateChips();
  }

  // ২. কার্ড রেন্ডার করা
  function render(data) {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = data.map(sol => `
      <div class="solution-card" onclick="openM(${sol.id})">
        <div class="card-icon">
          <i class="${sol.category === 'organic_fertilizer' ? 'fa-solid fa-vial-circle-check' : 'fa-solid fa-shield-virus'}"></i>
        </div>
        <h2 class="card-title">${sol.title}</h2>
        <p class="card-desc">${sol.short_description}</p>
        <div class="card-footer">
          <span class="badge"><i class="fa-solid fa-bolt"></i> ${sol.difficulty}</span>
          <span style="color: var(--accent); font-weight: 800;">দেখুন <i class="fa-solid fa-arrow-right-long"></i></span>
        </div>
      </div>
    `).join('');
  }

  // ৩. মোডাল ডেটা সেট করা
  function openM(id) {
    const s = allSolutions.find(item => item.id === id);
    if(!s) return;

    document.getElementById('mTitle').innerText = s.title;
    document.getElementById('mCategory').innerText = "# " + s.category.replace('_', ' ');
    document.getElementById('mTime').innerText = s.preparation_time_hours + " ঘণ্টা";
    document.getElementById('mDiff').innerText = s.difficulty === 'easy' ? "সহজ" : "মাঝারি";
    document.getElementById('mLife').innerText = s.shelf_life_days + " দিন";
    document.getElementById('mLongDesc').innerText = s.long_description;

    document.getElementById('mIngs').innerHTML = s.ingredients.map(i => `
      <div class="ingredient-tag"><i class="fa-solid fa-check-circle"></i> ${i.name} - ${i.quantity} ${i.unit}</div>
    `).join('');

    document.getElementById('mSteps').innerHTML = s.working_process.map(st => `
      <div class="step-item">
        <div class="step-count">${st.step}</div>
        <div class="step-text">${st.description}</div>
      </div>
    `).join('');

    document.getElementById('mFaqs').innerHTML = s.faqs.map(f => `
      <div class="faq-item">
        <div class="faq-q"><i class="fa-solid fa-comment-dots"></i> ${f.question}</div>
        <div class="faq-a" style="color: #555; padding-left: 32px;">${f.answer}</div>
      </div>
    `).join('');

    document.getElementById('modalOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeM() {
    document.getElementById('modalOverlay').style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  // ৪. ফিল্টার ও সার্চ
  function generateChips() {
    const cats = ['all', ...new Set(allSolutions.map(s => s.category))];
    const area = document.getElementById('filterArea');
    area.innerHTML = cats.map(c => `
      <div class="tag-chip ${c === 'all' ? 'active' : ''}" onclick="filterByCat('${c}', this)">
        <i class="fa-solid ${c === 'all' ? 'fa-leaf' : 'fa-tags'}"></i> ${c === 'all' ? 'সব সমাধান' : c.replace('_', ' ')}
      </div>
    `).join('');
  }

  function filterByCat(cat, el) {
    if(el) {
      document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    }
    const filtered = cat === 'all' ? allSolutions : allSolutions.filter(s => s.category === cat);
    render(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    const filtered = allSolutions.filter(s => 
      s.title.toLowerCase().includes(val) || 
      s.short_description.toLowerCase().includes(val)
    );
    render(filtered);
  });

  init();
</script>

</body>
</html>
