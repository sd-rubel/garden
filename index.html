<style>
/* ফন্ট ইমপোর্ট */
@font-face {
    font-family: 'Kalpurush';
    src: url('kalpurush.ttf') format('truetype');
    font-display: swap;
}
@font-face {
    font-family: 'ArabicFont';
    src: url('arabic.ttf') format('truetype');
    font-display: swap;
}

@counter-style bengali {
    system: numeric;
    symbols: '০' '১' '২' '৩' '৪' '৫' '৬' '৭' '৮' '৯';
}

* {
    margin: 0;

}

body {
    background: #f4f7f5;

}

/* ওয়েবসাইট হেডার */
header {
    background: linear-gradient(135deg, #1f4f3e, #2c6b55);

}

/* মূল কন্টেইনার */
.main-container {
    max-width: 850px;
    width: 92%;

}

/* ভিউ কন্ট্রোল */
.view-section {

}
.view-section.active {

}

/* --- ১. লিস্ট ভিউ স্টাইল --- */
.list-title {
    font-size: 16pt;
    color: #1f4f3e;
    margin-bottom: 15px;
    font-weight: bold;
    border-bottom: 2px solid #2c6b55;
    padding-bottom: 5px;
}

.dua-list {

}

.dua-item {
    background: white;
    padding: 16px 20px;

    border-radius: 12px;

.back-btn:hover {

.dua-card {

}

.dua-card-header {
    padding: 20px 24px;

    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.dua-card-title {
    font-size: 18pt;
    font-weight: 800;
    color: #2c6b55;
}

.arabic-text {
    font-family: 'ArabicFont', 'Scheherazade', serif;
    font-size: 26pt;
    text-align: center;
    direction: rtl;
    padding: 35px 24px;
    line-height: 1.6;
    background: #fafdfc;
    color: #1a1a1a;
    border-bottom: 1px solid #f6faf8;
}

.text-content {
    padding: 20px 24px;
}

.pronunciation-line, .meaning-line {
    font-size: 13pt;
    margin-bottom: 12px;
    text-align: justify;
}

.meaning-line {
    margin-bottom: 0;
}

.label {
    font-weight: 700;
    color: #bf6f2c;
    display: inline-block;

}

/* শব্দভিত্তিক গ্রিড */
.word-chips-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 15px 24px 25px;
    background: #fdfdfd;
    border-top: 1px dashed #e9efecc2;
}

.word-chip {
    background: #ffffff;
    border: 1px solid #e2ece8;
    border-radius: 10px;
    padding: 10px;
    min-width: 110px;
    max-width: 180px;
    flex: 1 1 calc(23% - 12px);
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.01);
}

.chip-arabic {
    font-family: 'ArabicFont', 'Scheherazade', serif;
    font-size: 16pt;
    font-weight: 600;
    direction: rtl;
    color: #1f5b48;
    margin-bottom: 4px;
}

.chip-pronounce {
    font-size: 9.5pt;
    color: #8b6e48;
    font-weight: bold;
    margin: 2px 0;
}

.chip-meaning {
    font-size: 9.5pt;

}

.no-word-msg {
    font-size: 10pt;
    color: #968c71;
    text-align: center;
    width: 100%;
    font-style: italic;

/* ফজিলত সেকশন */
.merit {

.merit b {

}

/* প্লেসহোল্ডার */

/* ওয়েবসাইট ফুটার */
footer {
    background: #1e2623;

    padding: 35px 20px;

    margin-top: 60px;
    font-size: 11pt;
    border-top: 4px solid #2c6b55;
}

footer .dev-info {
    margin-bottom: 10px;
    color: #e2ede9;
}

footer a {
    color: #4eb391;
    text-decoration: none;
}

footer a:hover {
    text-decoration: underline;
}

/* রেসপন্সিভ ডিজাইন */
@media (max-width: 600px) {
    header h1 { font-size: 22pt; }
    .dua-card-title { font-size: 15pt; }
    .arabic-text { font-size: 22pt; }
    .word-chip { flex: 1 1 calc(50% - 12px); }
    .dua-item { flex-direction: column; align-items: flex-start; gap: 6px; }
    .dua-item-source { align-self: flex-end; }
}
</style>

<div class="main-container">

<script>
let globalDuaData = []; // ডাটা গ্লোবালি রাখার জন্য
const baseUrl = "https://taqwa.top/"; // আপনার ওয়েবসাইটের মূল ইউআরএল

function toBengaliNumber(num) {
    if (num === undefined || num === null) return '';
    const en = '0123456789';
    const bn = '০১২৩৪৫৬৭৮৯';
    return num.toString().replace(/[0-9]/g, d => bn[en.indexOf(d)]);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.toString().replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
    });
}

// ডিফল্ট গ্লোবাল এসইও রিসেট করার ফাংশন (লিস্ট পেজে ফেরার সময়)
function resetGlobalSEO() {
    document.title = "Taqwa.top | ডিজিটাল দুআ ও জিকির ভাণ্ডার";
    document.getElementById('meta-desc').setAttribute("content", "Taqwa.top - সহীহ দুআ, জিকির এবং সূরাসমূহের শব্দভিত্তিক অর্থ ও ফজিলত বিশ্লেষণ। প্রতিদিনের প্রয়োজনীয় মাসনুন দুআ ও আমল।");
    document.getElementById('meta-keywords').setAttribute("content", "দুআ, সূরা, জিকির, শব্দভিত্তিক অর্থ, ফজিলত, মাসনুন দুআ, ইসলামিক আমল, Taqwa.top");
    document.getElementById('canonical-url').setAttribute("href", baseUrl);
    
    // OG রিসেট
    document.getElementById('og-title').setAttribute("content", "Taqwa.top | ডিজিটাল দুআ ও জিকির ভাণ্ডার");
    document.getElementById('og-desc').setAttribute("content", "সহীহ দুআ, জিকির এবং সূরাসমূহের শব্দভিত্তিক অর্থ ও ফজিলত বিশ্লেষণ।");
    document.getElementById('og-url').setAttribute("content", baseUrl);
}

// প্রতিটা দুআর জন্য ডাইনামিক এসইও সেট করার ফাংশন
function updateDynamicSEO(dua, index) {
    const name = dua.dua_name || 'দোয়া';
    const source = dua.source || 'সহীহ হাদীস';
    
    // ১. ডাইনামিক টাইটেল জেনারেট (উদা: আয়াতুল কুরসি এর অর্থ ও ফজিলত | Taqwa.top)
    const dynamicTitle = `${name} এর উচ্চারণ, অর্থ ও ফজিলত | উৎস: ${source} | Taqwa.top`;
    document.title = dynamicTitle;

    // ২. ডাইনামিক ডেসক্রিপশন (বাংলা অনুবাদ বা ফজিলতের প্রথম ১৫০ অক্ষর দিয়ে অটো ডেসক্রিপশন)
    let rawDesc = dua.bangla_translation || dua.merit || "";
    let cleanDesc = rawDesc.replace(/"/g, '').substring(0, 150);
    const dynamicDesc = `${name} এর আরবি, বাংলা উচ্চারণ, অনুবাদ এবং শব্দভিত্তিক বিশ্লেষণ। ফজিলত ও আমল: ${cleanDesc}...`;
    document.getElementById('meta-desc').setAttribute("content", dynamicDesc);

    // ৩. ডাইনামিক কিওয়ার্ডস
    const dynamicKeywords = `${name}, ${name} এর ফজিলত, ${name} এর অর্থ, ${name} উচ্চারণ, ${source}, দুআ, Taqwa.top`;
    document.getElementById('meta-keywords').setAttribute("content", dynamicKeywords);

    // ৪. ডাইনামিক ক্যানোনিকাল ও ওজি ইউআরএল (সার্চ ইঞ্জিনের চেনার সুবিধার্থে ভার্চুয়াল আইডি প্যাথ)
    const virtualUrl = `${baseUrl}?dua=${index + 1}`;
    document.getElementById('canonical-url').setAttribute("href", virtualUrl);
    
    // সোশ্যাল মিডিয়া ওজি ট্যাগস আপডেট
    document.getElementById('og-title').setAttribute("content", dynamicTitle);
    document.getElementById('og-desc').setAttribute("content", dynamicDesc);
    document.getElementById('og-url').setAttribute("content", virtualUrl);
}

// লিস্ট স্ক্রিনে যাওয়ার মূল ফাংশন
function showListView() {
    document.getElementById('detail-view').classList.remove('active');
    document.getElementById('list-view').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    resetGlobalSEO(); // লিস্টে ফিরলে এসইও ডিফল্ট অবস্থায় যাবে
}

// ডিটেইল বা একক তথ্য স্ক্রিনে যাওয়ার ফাংশন
function showDetailView(duaIdInArray, isPopState = false) {
    const dua = globalDuaData[duaIdInArray];
    if (!dua) return;

    const detailContainer = document.getElementById('dua-detail-container');
    detailContainer.innerHTML = '';

    let wordChipsHtml = '';
    if (Array.isArray(dua.word_by_word) && dua.word_by_word.length > 0) {
        wordChipsHtml = `
            <div class="word-chips-container">
                ${dua.word_by_word.map(w => `
                    <div class="word-chip">
                        <div class="chip-arabic">${escapeHtml(w.arabic || '—')}</div>
                        ${w.pronunciation ? `<div class="chip-pronounce">${escapeHtml(w.pronunciation)}</div>` : ''}
                        ${w.meaning ? `<div class="chip-meaning">${escapeHtml(w.meaning)}</div>` : ''}
                    </div>
                `).join('')}
            </div>
        `;
    } else {
        wordChipsHtml = `
            <div class="word-chips-container">
                <div class="no-word-msg">এই দুআটির শব্দভিত্তিক বিশ্লেষণ উপলব্ধ নেই।</div>
            </div>
        `;
    }

    const duaIdDisplay = dua.dua_id ? toBengaliNumber(dua.dua_id) + '. ' : '';

    detailContainer.innerHTML = `
        <div class="dua-card">
            <div class="dua-card-header">
                <div class="dua-card-title">${escapeHtml(duaIdDisplay + (dua.dua_name || 'দোয়া'))}</div>
                <div class="dua-item-source">${escapeHtml(dua.source || 'উৎস')}</div>
            </div>

            <div class="arabic-text">
                ${escapeHtml(dua.arabic_full || '')}
            </div>

            <div class="text-content">
                <div class="pronunciation-line">
                    <span class="label">উচ্চারণ:</span> ${escapeHtml(dua.pronunciation || '—')}
                </div>
                <div class="meaning-line">
                    <span class="label">অর্থ বাংলা:</span> ${escapeHtml(dua.bangla_translation || 'অনুবাদ নেই')}
                </div>
            </div>

            ${wordChipsHtml}

            <div class="merit">
                <b>ফজিলত ও আমল:</b> ${escapeHtml(dua.merit || 'ফজিলত উল্লেখ নেই')}
            </div>
        </div>
    `;

    document.getElementById('list-view').classList.remove('active');
    document.getElementById('detail-view').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // ১. মেটা ট্যাগ ও এসইও অটো-আপডেট
    updateDynamicSEO(dua, duaIdInArray);

    // ২. ব্যাক বাটনের জন্য নতুন একটি ভার্চুয়াল স্টেট পুশ করা
    if (!isPopState) {
        history.pushState({ page: 'detail', id: duaIdInArray }, '', `?dua=${duaIdInArray + 1}`);
    }
}

// ব্রাউজার বা মোবাইলের ব্যাক বাটন ডিটেক্ট করার লিসেনার
window.addEventListener('popstate', function(event) {
    if (event.state && event.state.page === 'detail') {
        showDetailView(event.state.id, true);
    } else {
        showListView();
        // ইউআরএল থেকে কুয়েরি প্যারামিটার ক্লিন করে মেইন ডোমেইনে আনা
        history.replaceState({ page: 'list' }, '', window.location.pathname);
    }
});

// উইন্ডো লোড হওয়ার পর data.json থেকে ডেটা আনা
document.addEventListener("DOMContentLoaded", function() {
    const listContainer = document.getElementById('dua-list-container');

    history.replaceState({ page: 'list' }, '', window.location.search ? window.location.href : window.location.pathname);

    fetch('data.json')
        .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        })
        .then(data => {
            globalDuaData = data;
            listContainer.innerHTML = '';

            if (!data || !data.length) {
                listContainer.innerHTML = '<div style="padding:20px; text-align:center; background:white; border-radius:12px;">কোনো ডেটা পাওয়া যায়নি।</div>';
                return;
            }

            data.forEach((dua, index) => {
                const duaIdDisplay = dua.dua_id ? toBengaliNumber(dua.dua_id) + '. ' : '';
                
                const li = document.createElement('li');
                li.className = 'dua-item';
                li.setAttribute('onclick', `showDetailView(${index})`);
                
                li.innerHTML = `
                    <div class="dua-item-name">${escapeHtml(duaIdDisplay + (dua.dua_name || 'দোয়া'))}</div>
                    <div class="dua-item-source">${escapeHtml(dua.source || 'উৎস')}</div>
                `;
                
                listContainer.appendChild(li);
            });

            // এডভান্সড এসইও রাউটিং: যদি কেউ সরাসরি লিংকে (যেমন: taqwa.top?dua=3) প্রবেশ করে, তবে সরাসরি সেই দুআ ওপেন হবে
            const urlParams = new URLSearchParams(window.location.search);
            const duaParam = urlParams.get('dua');
            if (duaParam) {
                const targetIndex = parseInt(duaParam) - 1;
                if (targetIndex >= 0 && targetIndex < globalDuaData.length) {
                    showDetailView(targetIndex, true);
                }
            }
        })
        .catch(error => {
            console.error(error);
            listContainer.innerHTML = `
                <div style="padding:20px; text-align:center; background:white; border-radius:12px;">
                    <h3 style="color:#aa5e2b;">তালিকা লোড করতে ব্যর্থ</h3>
                    <p style="margin-top:5px; color:#666;">আপনার data.json ফাইলটি ঠিক আছে কি না নিশ্চিত করুন।</p>
                </div>
            `;
        });
});
</script>

</body>
</html>
