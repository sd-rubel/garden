<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>SD Gardening Solution | Organic Plant Care</title>
  <!-- Hind Siliguri Font (Soft Bengali/ Hindi friendly) -->
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: linear-gradient(145deg, #eef7e8 0%, #d9e8cf 100%);
      min-height: 100vh;
      padding: 1rem;
      color: #1a3a1a;
    }

    /* main container */
    .app-container {
      max-width: 550px;
      margin: 0 auto;
      background: rgba(255, 255, 245, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 32, 0, 0.2);
      overflow: hidden;
      padding: 1.2rem 1rem 1.8rem;
      transition: all 0.2s ease;
    }

    /* header / logo area */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 1rem;
      border-bottom: 2px solid #6f9e3f;
      margin-bottom: 1.5rem;
    }
    .logo-icon {
      background: #2e7d32;
      width: 48px;
      height: 48px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 12px rgba(46, 125, 50, 0.2);
    }
    .logo-icon svg {
      width: 32px;
      height: 32px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1f5e2c, #4c8b3c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    .sub {
      font-size: 0.7rem;
      color: #567845;
      font-weight: 500;
      margin-top: 4px;
    }

    /* stats & loader */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      background: #efffe7;
      padding: 0.5rem 1rem;
      border-radius: 40px;
    }
    .solution-count {
      font-weight: 600;
      background: #2e5c2e;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      color: white;
      font-size: 0.75rem;
    }
    .loader-small {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #3b6e3b;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #c8e6b5;
      border-top: 2px solid #2e7d32;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* title list grid */
    .titles-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-top: 0.5rem;
      max-height: 65vh;
      overflow-y: auto;
      padding-right: 4px;
    }
    .title-card {
      background: white;
      border-radius: 28px;
      padding: 1rem 1.3rem;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
      transition: all 0.2s;
      border: 1px solid #e2f0d3;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title-card:hover {
      transform: translateY(-3px);
      background: #fefffa;
      border-color: #9bc06d;
      box-shadow: 0 12px 20px -10px rgba(70, 110, 30, 0.2);
    }
    .title-text {
      font-weight: 600;
      font-size: 1.1rem;
      color: #1b4d1b;
      line-height: 1.3;
      flex: 1;
    }
    .click-badge {
      background: #d9e8cf;
      border-radius: 50px;
      padding: 5px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #2a6230;
    }
    .empty-msg {
      text-align: center;
      padding: 3rem;
      background: #fafae9;
      border-radius: 2rem;
      color: #6b8c4a;
      font-weight: 500;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(20, 35, 10, 0.7);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
      padding: 1rem;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-container {
      background: #ffffffef;
      backdrop-filter: blur(4px);
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      border-radius: 2rem;
      overflow-y: auto;
      box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
      animation: fadeSlideUp 0.25s ease-out;
    }
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .modal-header {
      position: sticky;
      top: 0;
      background: #f1f9ea;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #cbe5b4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }
    .modal-header h3 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1c4f1c;
      margin: 0;
      padding-right: 1rem;
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #577a39;
      transition: 0.1s;
      line-height: 1;
    }
    .modal-body {
      padding: 1.5rem;
    }
    .detail-section {
      margin-bottom: 1.8rem;
      border-bottom: 1px dashed #cfe3c0;
      padding-bottom: 1rem;
    }
    .detail-section h4 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2f6b2f;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ingredient-list, .step-list {
      padding-left: 1.2rem;
      list-style-type: none;
    }
    .ingredient-list li, .step-list li {
      margin-bottom: 0.6rem;
      display: flex;
      gap: 10px;
      font-size: 0.95rem;
    }
    .step-number {
      font-weight: 700;
      background: #e1f0d4;
      width: 26px;
      height: 26px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #2b692b;
    }
    .badge-info {
      display: inline-block;
      background: #eaf5e1;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      margin-right: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .faq-item {
      background: #f8fff2;
      border-radius: 1rem;
      margin-bottom: 0.8rem;
      padding: 0.7rem 1rem;
    }
    .faq-q {
      font-weight: 700;
      color: #2a572a;
      margin-bottom: 0.3rem;
      font-size: 0.9rem;
    }
    .faq-a {
      font-size: 0.85rem;
      color: #3f5438;
      line-height: 1.4;
    }
    hr {
      margin: 1rem 0;
      border-color: #cce2bb;
    }
    .footer-meta {
      font-size: 0.7rem;
      color: #658a48;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e9db;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #8bb56a;
      border-radius: 10px;
    }
    button {
      font-family: inherit;
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L3 9L12 15L21 9L12 3Z" stroke="#FEF9E6" stroke-width="1.2" fill="#F9A825"/>
        <path d="M12 15L12 21" stroke="#FEF9E6" stroke-width="1.5" fill="none"/>
        <path d="M8 17L16 17" stroke="#FEF9E6" stroke-width="1.5" fill="none"/>
        <circle cx="12" cy="9" r="1.5" fill="#FEF9E6"/>
        <path d="M5 12L3 13.5L5 15" stroke="#FEF9E6" stroke-width="1.2" fill="none"/>
        <path d="M19 12L21 13.5L19 15" stroke="#FEF9E6" stroke-width="1.2" fill="none"/>
      </svg>
    </div>
    <div>
      <h1>Sd Gardening Solution</h1>
      <div class="sub">জৈব সমাধান • গাছের বন্ধু</div>
    </div>
  </div>

  <div class="info-bar">
    <span>🌿 আমার গাছের টিপস</span>
    <span id="solutionCount" class="solution-count">০ টি সমাধান</span>
  </div>

  <div id="loaderIndicator" class="loader-small" style="justify-content: center; margin-bottom: 12px;">
    <div class="spinner"></div> <span>ডাটা লোড হচ্ছে (task/01.json, 02.json ...)</span>
  </div>

  <div id="titlesContainer" class="titles-grid">
    <!-- dynamic titles will appear here -->
    <div class="empty-msg">⏳ JSON ফাইল থেকে সমাধান সংগ্রহ করা হচ্ছে...</div>
  </div>
</div>

<!-- Modal for details -->
<div id="detailModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h3 id="modalTitle">বিস্তারিত</h3>
      <button class="close-modal" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-body" id="modalBodyContent">
      <!-- dynamic details injected -->
      <div style="text-align:center; padding:1rem;">লোড হচ্ছে...</div>
    </div>
  </div>
</div>

<script>
  // -------------------------------
  // Global data store
  // -------------------------------
  let allSolutions = [];      // array of solution objects from all JSON files
  let isLoadingComplete = false;

  // DOM elements
  const titlesContainer = document.getElementById('titlesContainer');
  const solutionCountSpan = document.getElementById('solutionCount');
  const loaderIndicator = document.getElementById('loaderIndicator');
  const modalOverlay = document.getElementById('detailModal');
  const modalBody = document.getElementById('modalBodyContent');
  const modalTitleSpan = document.getElementById('modalTitle');
  const closeModalBtn = document.getElementById('closeModalBtn');

  // Helper: close modal
  function closeModal() {
    modalOverlay.classList.remove('active');
  }

  function openModal() {
    modalOverlay.classList.add('active');
  }

  // Render all titles (only titles from allSolutions)
  function renderTitles() {
    if (!allSolutions.length) {
      titlesContainer.innerHTML = `<div class="empty-msg">🌱 কোনো সমাধান পাওয়া যায়নি। নিশ্চিত করুন task/01.json, task/02.json ফাইল ঠিক আছে।</div>`;
      solutionCountSpan.innerText = `০ টি সমাধান`;
      return;
    }
    solutionCountSpan.innerText = `${allSolutions.length} টি সমাধান`;
    
    // create title cards
    let html = '';
    allSolutions.forEach((sol, idx) => {
      // safety title fallback
      const titleText = sol.title || 'নাম নেই';
      html += `
        <div class="title-card" data-solution-index="${idx}">
          <span class="title-text">🌻 ${escapeHtml(titleText)}</span>
          <span class="click-badge">বিস্তারিত →</span>
        </div>
      `;
    });
    titlesContainer.innerHTML = html;
    
    // attach click events to each card
    document.querySelectorAll('.title-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const idxAttr = card.getAttribute('data-solution-index');
        if (idxAttr !== null) {
          const solution = allSolutions[parseInt(idxAttr)];
          if (solution) {
            showSolutionDetails(solution);
          }
        }
      });
    });
  }
  
  // Escape HTML to avoid injection
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Build detailed view from solution object
  function showSolutionDetails(solution) {
    // Prepare ingredients list
    let ingredientsHtml = '';
    if (solution.ingredients && Array.isArray(solution.ingredients) && solution.ingredients.length) {
      ingredientsHtml = `<ul class="ingredient-list">`;
      solution.ingredients.forEach(ing => {
        const ingName = ing.name || '';
        const qty = ing.quantity ? ing.quantity : '';
        const unit = ing.unit || '';
        ingredientsHtml += `<li>🍃 <strong>${escapeHtml(ingName)}</strong> : ${qty} ${unit}</li>`;
      });
      ingredientsHtml += `</ul>`;
    } else {
      ingredientsHtml = `<p style="font-size:0.85rem">তথ্য পাওয়া যায়নি</p>`;
    }
    
    // Working process steps
    let stepsHtml = '';
    if (solution.working_process && Array.isArray(solution.working_process) && solution.working_process.length) {
      stepsHtml = `<ol class="step-list" style="list-style:none; padding-left:0;">`;
      solution.working_process.forEach(step => {
        const stepDesc = step.description || '';
        const stepNum = step.step || '';
        stepsHtml += `<li><span class="step-number">${stepNum}</span> <span>${escapeHtml(stepDesc)}</span></li>`;
      });
      stepsHtml += `</ol>`;
    } else {
      stepsHtml = `<p>নির্দেশনা নেই</p>`;
    }
    
    // FAQs
    let faqsHtml = '';
    if (solution.faqs && Array.isArray(solution.faqs) && solution.faqs.length) {
      solution.faqs.forEach(faq => {
        const ques = faq.question || '';
        const ans = faq.answer || '';
        faqsHtml += `
          <div class="faq-item">
            <div class="faq-q">❓ ${escapeHtml(ques)}</div>
            <div class="faq-a">💡 ${escapeHtml(ans)}</div>
          </div>
        `;
      });
    } else {
      faqsHtml = `<p>কোনো প্রশ্নোত্তর নেই</p>`;
    }
    
    // Meta badges: difficulty, time, interval, shelf life
    let metaHtml = '';
    if (solution.difficulty) metaHtml += `<span class="badge-info">🧑‍🌾 সহজতর: ${escapeHtml(solution.difficulty)}</span>`;
    if (solution.preparation_time_hours) metaHtml += `<span class="badge-info">⏱️ প্রস্তুত সময়: ${solution.preparation_time_hours} ঘণ্টা</span>`;
    if (solution.application_interval_days) metaHtml += `<span class="badge-info">📅 প্রয়োগ ব্যবধান: ${solution.application_interval_days} দিন</span>`;
    if (solution.shelf_life_days) metaHtml += `<span class="badge-info">🗄️ সংরক্ষণ: ${solution.shelf_life_days} দিন</span>`;
    if (solution.category) metaHtml += `<span class="badge-info">🏷️ ${escapeHtml(solution.category)}</span>`;
    
    // Tags if present
    let tagsHtml = '';
    if (solution.tags && Array.isArray(solution.tags) && solution.tags.length) {
      tagsHtml = `<div style="margin-top: 8px;">${solution.tags.map(t => `<span class="badge-info">#${escapeHtml(t)}</span>`).join('')}</div>`;
    }
    
    const longDesc = solution.long_description || solution.short_description || 'বিস্তারিত তথ্য নেই।';
    
    const detailsHtml = `
      <div class="detail-section">
        <h4>📖 বিবরণ</h4>
        <p style="line-height:1.45;">${escapeHtml(longDesc)}</p>
        ${solution.short_description ? `<p style="margin-top:8px; font-size:0.85rem; color:#567845;">✨ ${escapeHtml(solution.short_description)}</p>` : ''}
      </div>
      
      <div class="detail-section">
        <h4>🧪 উপকরণ</h4>
        ${ingredientsHtml}
      </div>
      
      <div class="detail-section">
        <h4>🛠️ প্রস্তুত প্রণালী</h4>
        ${stepsHtml}
      </div>
      
      <div class="detail-section">
        <h4>❓ সাধারণ জিজ্ঞাসা</h4>
        ${faqsHtml}
      </div>
      
      <div class="detail-section">
        <h4>⚙️ অতিরিক্ত তথ্য</h4>
        <div class="footer-meta">${metaHtml}</div>
        ${tagsHtml}
        ${solution.id ? `<div style="margin-top: 8px; font-size:0.7rem;">ID: ${solution.id}</div>` : ''}
        ${solution.slug ? `<div style="font-size:0.7rem;">slug: ${escapeHtml(solution.slug)}</div>` : ''}
      </div>
    `;
    
    modalTitleSpan.innerText = solution.title || 'গাছের সমাধান';
    modalBody.innerHTML = detailsHtml;
    openModal();
  }
  
  // ---------- INFINITE LOOP: fetch task/01.json, task/02.json, task/03.json ... until 404 ----------
  async function fetchAllJsonFilesInfinitely() {
    let fileIndex = 1;
    const allFetchedSolutions = [];
    let lastFetchFailed = false;
    
    // Show loading indicator
    loaderIndicator.style.display = 'flex';
    titlesContainer.innerHTML = `<div class="empty-msg"><div class="spinner" style="margin:0 auto 10px;"></div>JSON ফাইল অনুসন্ধান (task/01.json, 02.json ...)</div>`;
    
    while (!lastFetchFailed) {
      // format filename: 01, 02, 03 ... (two digits)
      const fileNumber = fileIndex.toString().padStart(2, '0');
      const url = `task/${fileNumber}.json`;
      try {
        const response = await fetch(url);
        if (!response.ok) {
          // 404 or other error -> stop fetching (infinite loop stops)
          if (response.status === 404) {
            console.log(`File ${url} not found, stopping sequence.`);
          } else {
            console.warn(`Error ${response.status} for ${url}, stopping.`);
          }
          lastFetchFailed = true;
          break;
        }
        const data = await response.json();
        // check if gardening_solutions exists and is array
        if (data && Array.isArray(data.gardening_solutions)) {
          const newSolutions = data.gardening_solutions;
          if (newSolutions.length) {
            allFetchedSolutions.push(...newSolutions);
            console.log(`Loaded ${newSolutions.length} solutions from ${url}`);
          }
        } else {
          console.warn(`File ${url} does not contain gardening_solutions array.`);
        }
        fileIndex++;
      } catch (err) {
        // network error or JSON parse error
        console.error(`Failed to fetch/parse ${url}:`, err);
        lastFetchFailed = true;
        break;
      }
    }
    
    // After loop ends, update global allSolutions and re-render
    if (allFetchedSolutions.length === 0) {
      loaderIndicator.innerHTML = `<span>⚠️ কোনো JSON ফাইল পাওয়া যায়নি। task/01.json, task/02.json প্রয়োজন।</span>`;
      loaderIndicator.style.background = "#fff0cf";
      loaderIndicator.style.padding = "0.5rem";
      loaderIndicator.style.borderRadius = "40px";
      titlesContainer.innerHTML = `<div class="empty-msg">📂 ডাটা ফাইল নেই। নিশ্চিত করুন: task/01.json এবং task/02.json ফোল্ডারে আছে।</div>`;
      solutionCountSpan.innerText = `০ টি সমাধান`;
    } else {
      allSolutions = allFetchedSolutions;
      renderTitles();
      loaderIndicator.style.display = 'none';
    }
    isLoadingComplete = true;
  }
  
  // optional: attach modal close events
  function initModalEvents() {
    closeModalBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
        closeModal();
      }
    });
  }
  
  // Start fetching all JSON files in infinite (sequential) loop
  fetchAllJsonFilesInfinitely().then(() => {
    // final update
    if (allSolutions.length === 0) {
      // maybe show more helpful message
    }
  }).catch(err => {
    console.error(err);
    loaderIndicator.innerHTML = `<span>❗ সংযোগ ত্রুটি, JSON ফাইল লোড হয়নি</span>`;
    titlesContainer.innerHTML = `<div class="empty-msg">সার্ভার সমস্যা বা ফাইল পাথ ঠিক নয়। task/01.json উপস্থিত থাকতে হবে।</div>`;
  });
  
    // initialize UI events
  initModalEvents();
  
  // optional: if user wants to manually re-fetch but not needed, but we have infinity loop principle on load.
  // The specification: "ইনফিটি টাইম চলতে থাকবে একটা লুপ সেট করে নেবেন" means the fetching loop attempts sequence until no more files.
  // This implementation perfectly covers that: loop from 1,2,3,... until failure.
  // All solutions aggregated, titles shown, click -> details.
</script>
</body>
</html>
